name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Keep in sync with DEFAULT_VSCODE_VERSION in
  # src/test/integration/runIntegration.ts and with VSCODE_TEST_VERSION
  # in .github/workflows/ci.yml. The cache key below depends on it.
  VSCODE_TEST_VERSION: 1.90.0

jobs:
  release:
    name: Build and publish VSIX to GitHub Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --omit=optional

      - name: Cache VS Code test binary
        uses: actions/cache@v4
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ env.VSCODE_TEST_VERSION }}

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Tests (unit + activation smoke; E2E is local-only)
        run: xvfb-run -a npm test

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: |
          npx --yes @vscode/vsce package \
            --no-dependencies \
            --out vscode-csharp-copy-as-json-${{ steps.ver.outputs.version }}.vsix

      - name: Create GitHub Release with VSIX attached
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: vscode-csharp-copy-as-json-${{ steps.ver.outputs.version }}.vsix